services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: parroquia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: parroquia_db
      POSTGRES_USER: parroquia_user
      POSTGRES_PASSWORD: ParroquiaSecure2025
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - parroquia-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parroquia_user -d parroquia_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend App
  backend:
    image: mia-backend-xj2zgp
    container_name: parroquia-backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: parroquia_db
      DB_USER: parroquia_user
      DB_PASSWORD: ParroquiaSecure2025
      JWT_SECRET: supersecreto
      JWT_REFRESH_SECRET: refrescosecreto
    ports:
      - "3001:3000"   # <-- usa 3001 en el host para no chocar con dokploy
    depends_on:
      - postgres
    networks:
      - parroquia-network

networks:
  parroquia-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  app_logs:
    driver: local
version: '3.8'

services:
  # PostgreSQL Database for QA
  postgres-qa:
    image: postgres:15-alpine
    container_name: parroquia-postgres-qa
    restart: unless-stopped
    environment:
      POSTGRES_DB: parroquia_qa_db
      POSTGRES_USER: parroquia_qa_user
      POSTGRES_PASSWORD: "ParroquiaQASecure2025"
    volumes:
      - postgres_qa_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Puerto diferente para QA
    networks:
      - parroquia-qa-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parroquia_qa_user -d parroquia_qa_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Parroquia API Application for QA
  api-qa:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: parroquia-api-qa
    restart: unless-stopped
    depends_on:
      postgres-qa:
        condition: service_healthy
    environment:
      - NODE_ENV=qa
      - PORT=5000  # Puerto 5000 para QA
      - DB_HOST=postgres-qa
      - DB_PORT=5432
      - DB_NAME=parroquia_qa_db
      - DB_USER=parroquia_qa_user
      - DB_PASS=ParroquiaQASecure2025
      - JWT_SECRET=${JWT_SECRET_QA:-qa_jwt_secret_change_me}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET_QA:-qa_refresh_secret_change_me}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS:-10}  # Menos rounds para QA (más rápido)
      - FRONTEND_URL=${FRONTEND_URL_QA:-http://localhost:5000}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - SEND_REAL_EMAILS=${SEND_REAL_EMAILS:-false}  # No enviar emails reales en QA
      - VERBOSE_LOGGING=${VERBOSE_LOGGING:-true}
      - FORCE_DB_SYNC=${FORCE_DB_SYNC:-false}  # Sincronización automática en QA
      - PM2_PUBLIC_KEY=${PM2_PUBLIC_KEY:-}
      - PM2_SECRET_KEY=${PM2_SECRET_KEY:-}
    ports:
      - "5000:5000"  # Exponer puerto 5000
    networks:
      - parroquia-qa-network
    volumes:
      - app_qa_logs:/app/logs
      - app_qa_temp:/app/temp
      - app_qa_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s

  # Nginx Reverse Proxy for QA (optional)
  nginx-qa:
    image: nginx:alpine
    container_name: parroquia-nginx-qa
    restart: unless-stopped
    depends_on:
      api-qa:
        condition: service_healthy
    ports:
      - "8081:80"  # Puerto diferente para nginx QA
    volumes:
      - ./nginx.qa.conf:/etc/nginx/nginx.conf:ro
      - nginx_qa_logs:/var/log/nginx
    networks:
      - parroquia-qa-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  parroquia-qa-network:
    driver: bridge

volumes:
  postgres_qa_data:
    driver: local
  app_qa_logs:
    driver: local
  app_qa_temp:
    driver: local
  app_qa_uploads:
    driver: local
  nginx_qa_logs:
    driver: local
